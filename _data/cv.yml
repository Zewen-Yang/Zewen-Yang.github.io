          - |
            **Federal Ministry of Health, Germany — [AI-DAVis-PANDEMICS](https://www.bundesgesundheitsministerium.de/ministerium/ressortforschung/handlungsfelder/digitalisierung/ai-davis-pandemics)**: AI-supported Data Analysis & Visualization of Pandemics (€1.78 Million)
            - Built a real-time audience-centric web app for pandemic surveillance with ML-based data analysis
            - Proposed a nested framework for ML models' design and validation considering AI regulations
            - Designed interpretable molecular encodings and representations for machine learning tasks

      - company: Data Science Retreat
        position: Data Scientist
        location: Berlin, Germany
        url: https://datascienceretreat.com/about
        start_date: 2022-12-01
        end_date: 2023-05-31
        highlights:
          - "Statistical Learning: evaluated time series models via MLflow for forecasting the spread of disease; built a churn prediction model with data pre-processing and feature engineering"
          - "Deep Learning: real-time object detection, action detection and gesture analysis for sign language recognition; trained image classification models using vision transformers"
          - "Natural Language Processing: extracted and visualized character relationships via named entity recognition; used node and word embeddings to recommend research collaborators; fine-tuned language models for segmentation and text-generation tasks with GPT"

      - company: Technical University of Munich — Chair of Information-oriented Control
        position: Research Associate
        location: Munich, Germany
        url: https://www.ce.cit.tum.de/en/itr/home/
        start_date: 2019-09-01
        end_date: 2022-11-30
        highlights:
          - Supervised 10+ student theses, several achieving the highest German grade (1.0)
          - "Teaching Curriculum: Advanced Control and Robotics"
          - |
            **European Union's Horizon 2020 — [SeaClear](https://seaclear-project.eu/)**: Search, Identification and Collection of Marine Litter with Autonomous Robots (1.0: €5 Million, 2.0: €9 Million)
            - Developed a data-driven model for Autonomous Underwater Vehicles (AUVs) with uncertainty quantification
            - Created a simulation platform for conducting control tests of AUVs
            - Contributed to hardware tests at Marseilles and Hamburg ports (e.g., bottle grabbing and vehicle recycling)
          - |
            **European Union's Horizon 2020 — [REHYB](https://rehyb.eu/)**: Rehabilitation Based on Hybrid Neuroprosthesis (€7 Million)
            - Built a digital twin for real-time monitoring of human motion
            - Detected abnormal movements using deep neural networks with multiple sensors
            - Investigated the safe control of human muscles by FES to achieve functional movements

      - company: Harbin Engineering University — College of Intelligent Systems Science and Engineering
        position: Principal Investigator / Doctoral Researcher 
        location: Harbin, China
        url: https://heucisse.hrbeu.edu.cn/
        start_date: 2017-09-01
        end_date: 2022-06-30
        highlights:
          - |
            **Ph.D. Student Research & Innovation Fund of Fundamental Research Funds for Central Universities**: Research on the Coordinated Control Method of AUV Swarm (¥70k)
            - Led a research team and completed the project with top-tier publications
            - Proposed novel formation control methods for AUV swarm using the consensus algorithm
          - |
            **National Natural Science Foundation of China & National Key Innovation Project**: Environmental Prediction & Task Reconfiguration of AUV for Covert Operations in the Coastal Sea (¥600k); Overall Technology Scheme of the Multiple AUVs System (¥50 Million)
            - Developed advanced control algorithms for underactuated AUVs
            - Investigated obstacle avoidance and recovery docking approaches for AUVs
            - Authored a chapter titled "Reliability Analysis & Design Technology of AUV" in *Control Technology of AUV*

